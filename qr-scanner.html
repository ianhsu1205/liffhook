<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=0.85, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>🎫 保留座位搭乘確認</title>
    <!-- 🚀 優化：DNS預解析和資源預載 -->
    <link rel="dns-prefetch" href="//static.line-scdn.net" />
    <link rel="preconnect" href="https://static.line-scdn.net" crossorigin />
    <link
      rel="preload"
      href="https://static.line-scdn.net/liff/edge/2/sdk.js"
      as="script"
      crossorigin="anonymous"
    />
    <!-- 載入最新版本的 LIFF SDK -->
    <script
      src="https://static.line-scdn.net/liff/edge/2/sdk.js"
      crossorigin="anonymous"
    ></script>
    <!-- 備用 LIFF SDK -->
    <script>
      // 檢查 LIFF SDK 是否載入成功，如果失敗則嘗試載入備用版本
      window.addEventListener("load", function () {
        setTimeout(function () {
          if (typeof liff === "undefined") {
            console.warn("主要 LIFF SDK 載入失敗，嘗試載入備用版本...")
            const script = document.createElement("script")
            script.src =
              "https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"
            script.crossOrigin = "anonymous"
            script.onload = function () {
              console.log("備用 LIFF SDK 載入成功")
              // 重新觸發初始化
              if (typeof initLiff === "function") {
                console.log("重新觸發 LIFF 初始化")
                initLiff()
              }
            }
            script.onerror = function () {
              console.error("備用 LIFF SDK 也載入失敗")
              alert("無法載入LINE功能，請檢查網路連接並重新整理頁面")
            }
            document.head.appendChild(script)
          }
        }, 2000)
      })
    </script>
    <style>
      * {
        box-sizing: border-box;
        touch-action: manipulation; /* 避免雙擊縮放 */
      }

      /* 掃描時暫停所有動畫與過渡效果以減少 CPU/GPU 負擔 */
      .suspend-transitions * {
        transition: none !important;
        animation: none !important;
        box-shadow: none !important;
        backdrop-filter: none !important;
        will-change: auto !important; /* 重設 will-change 以釋放 GPU 資源 */
      }

      /* 簡化掃描階段的背景，避免耗費資源 */
      .scanning-mode {
        background: #3b5998 !important;
        -webkit-transform: translateZ(0); /* 啟用硬體加速但固定上下文 */
        transform: translateZ(0);
        image-rendering: optimizeSpeed; /* 最佳化影像效能 */
      }
      .scanning-mode .container {
        box-shadow: none !important;
      }

      body {
        font-family: "Microsoft JhengHei", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        margin: 0;
        padding: 0;
        color: #333;
        min-height: 100vh;
        /* 🚀 優化：減少 repaint/reflow */
        contain: layout style paint;
        will-change: transform;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        min-height: 100vh;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      }

      /* 頭部區域 */
      .header {
        background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        color: white;
        padding: 25px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .header h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
      }

      .header .subtitle {
        margin: 8px 0 0 0;
        font-size: 14px;
        opacity: 0.9;
      }

      /* 內容區域 */
      .content {
        padding: 30px 25px;
      }

      .scan-section {
        margin-bottom: 30px;
        padding: 25px;
        border: 2px solid #ecf0f1;
        border-radius: 15px;
        background: #fafafa;
        text-align: center;
      }

      .scan-title {
        font-size: 20px;
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 15px;
      }

      .form-control {
        width: 100%;
        padding: 15px;
        border: 2px solid #e9ecef;
        border-radius: 12px;
        font-size: 16px;
        margin-bottom: 15px;
        transition: all 0.3s ease;
        background: white;
      }

      .form-control:focus {
        border-color: #3498db;
        background: white;
        outline: none;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        transform: translateY(-1px);
      }

      .btn {
        background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        color: white;
        border: none;
        padding: 15px 25px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin: 5px;
        min-width: 120px;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
      }

      .btn:disabled {
        background: #cccccc;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-success {
        background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
      }

      .btn-success:hover {
        box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
      }

      /* 掃描結果顯示 */
      .scan-result {
        margin-top: 20px;
        padding: 20px;
        border-radius: 12px;
        display: none;
        text-align: left;
      }

      .scan-result.success {
        background: #d5f4e6;
        border: 2px solid #27ae60;
        color: #27ae60;
      }

      .scan-result.error {
        background: #fdeaea;
        border: 2px solid #e74c3c;
        color: #e74c3c;
      }

      /* 乘客信息 */
      .passenger-info {
        background: white;
        padding: 20px;
        border-radius: 12px;
        margin: 15px 0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        display: none;
      }

      .passenger-info h3 {
        margin: 0 0 15px 0;
        color: #2c3e50;
        font-size: 18px;
      }

      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 15px;
      }

      .info-item {
        background: #f8f9fa;
        padding: 12px;
        border-radius: 8px;
        border-left: 4px solid #3498db;
      }

      .info-label {
        font-size: 12px;
        color: #666;
        margin-bottom: 4px;
        font-weight: 600;
      }

      .info-value {
        font-size: 16px;
        color: #2c3e50;
        font-weight: 600;
      }

      /* 操作按鈕區 */
      .action-buttons {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      /* 狀態消息 */
      .status-message {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 25px;
        border-radius: 25px;
        font-weight: 600;
        z-index: 1000;
        max-width: 90%;
        text-align: left;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .status-message.success {
        background: rgba(39, 174, 96, 0.95);
        color: white;
      }

      .status-message.error {
        background: rgba(231, 76, 60, 0.95);
        color: white;
        padding: 22px 20px;
        text-align: center;
        font-size: 17px;
        line-height: 1.6;
        top: 50%;
        transform: translate(-50%, -50%);
        max-width: 85%;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }

      .status-message.error button {
        margin-top: 12px !important;
        padding: 8px 20px !important;
        font-weight: bold !important;
      }

      /* 加載動畫 */
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.9);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 0.2s,
          transform 0.2s;
        will-change: opacity, transform;
        /* 減少合成器負載 */
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        pointer-events: none; /* 隱藏時不阻擋點擊 */
      }

      .loading-overlay.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto; /* 顯示時才可互動（阻擋底層） */
      }

      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        will-change: transform;
      }

      .loading-text {
        margin-top: 15px;
        color: #666;
        font-size: 16px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .success-animation {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(39, 174, 96, 0.9);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10000;
        color: white;
      }

      .success-animation h2 {
        font-size: 32px;
        margin-bottom: 20px;
        animation: pulse 1s ease-in-out infinite alternate;
      }

      .success-animation .success-details {
        font-size: 18px;
        text-align: left;
        margin-bottom: 30px;
      }

      /* 通用隱藏樣式 */
      .hidden {
        display: none !important;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        100% {
          transform: scale(1.1);
        }
      }
    </style>
  </head>
  <body>
    <!-- 加載遮罩 -->
    <div id="loadingOverlay" class="loading-overlay">
      <div class="loading-spinner"></div>
      <div class="loading-text">處理中...</div>
    </div>

    <!-- 成功動畫 -->
    <div id="successAnimation" class="success-animation hidden">
      <h2>確認完成！歡迎搭乘</h2>
      <div class="success-details" id="successDetails">
        歡迎您的搭乘，已確認您的保留座位資訊
      </div>
      <div style="font-size: 14px; opacity: 0.8">20秒後自動關閉...</div>
    </div>

    <div class="container">
      <!-- 狀態指示器 -->
      <div
        id="statusIndicator"
        style="
          background: #f39c12;
          color: white;
          padding: 10px;
          text-align: left;
          font-size: 14px;
        "
      >
        🔄 正在初始化LIFF...
      </div>

      <!-- 頭部 -->
      <div class="header">
        <h1>保留座位搭乘確認</h1>
        <div class="subtitle">自動開啟掃描器，掃描QR Code進行掃描確認</div>
      </div>

      <!-- 內容 -->
      <div class="content">
        <!-- 掃描區域 -->
        <div class="scan-section">
          <div class="scan-title">📱 QR Code 掃描確認</div>
          <div style="text-align: left; color: #666; margin-bottom: 20px">
            系統將自動開啟掃描器，請對準預約QR Code進行掃描
          </div>

          <!-- 掃描結果顯示 -->
          <div id="scanResult" class="scan-result">
            <div id="scanResultContent"></div>
          </div>

          <!-- 中央提醒訊息（例如：本趟次尚未發車） -->
          <div
            id="inlineCenterAlert"
            style="
              display: none;
              margin: 25px auto 0;
              max-width: 480px;
              text-align: center;
              position: relative;
              z-index: 12000;
              pointer-events: auto;
            "
          >
            <div
              id="inlineCenterAlertBox"
              style="
                background: #fff5f5;
                border: 2px solid #e53935;
                color: #b71c1c;
                padding: 20px 18px 18px;
                border-radius: 18px;
                font-size: 18px;
                font-weight: 600;
                line-height: 1.5;
                position: relative;
                box-shadow:
                  0 6px 18px -4px rgba(229, 57, 53, 0.35),
                  0 2px 6px rgba(0, 0, 0, 0.08);
                animation: fadeInScale 0.35s ease;
              "
            >
              <div id="inlineCenterAlertMessage">⚠️ 本趟次尚未發車</div>
              <div
                id="inlineCenterAlertSub"
                style="
                  margin-top: 8px;
                  font-size: 13px;
                  font-weight: 500;
                  opacity: 0.8;
                  letter-spacing: 0.5px;
                "
              >
                請在發車後再進行掃描確認
              </div>
              <button
                id="inlineCenterAlertClose"
                type="button"
                data-close-inline="1"
                data-close="1"
                data-direct-close="1"
                style="
                  margin-top: 18px;
                  background: #d32f2f;
                  color: #fff;
                  border: none;
                  padding: 10px 22px;
                  font-size: 15px;
                  font-weight: 600;
                  border-radius: 25px;
                  cursor: pointer;
                  box-shadow: 0 4px 12px rgba(211, 47, 47, 0.35);
                  transition: 0.25s;
                "
                onmouseover="this.style.background = '#b71c1c'"
                onmouseout="this.style.background = '#d32f2f'"
              >
                我知道了 (返回)
              </button>
              <div
                id="inlineCenterAlertCountdown"
                style="margin-top: 10px; font-size: 12px; opacity: 0.7"
              >
                15 秒後自動關閉並返回聊天室...
              </div>
            </div>
          </div>
        </div>

        <!-- 預約資訊顯示區域 -->
        <div id="reservationInfo" class="passenger-info" style="display: none">
          <h3>📝 您的保留資訊</h3>
          <div id="reservationDetails" class="info-grid">
            <!-- 動態生成內容 -->
          </div>
          <div
            style="
              text-align: left;
              margin-top: 20px;
              color: #666;
              font-size: 14px;
            "
          >
            <div id="autoCloseTimer">20秒後自動關閉並返回聊天室...</div>
          </div>
        </div>

        <!-- 緊急重啟按鈕，連點5次狀態指示器啟動 -->
        <div
          id="emergencyRestart"
          style="
            position: fixed;
            bottom: 20px;
            left: 15px;
            color: #999;
            font-size: 12px;
            cursor: pointer;
            display: none;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
          "
          onclick="restartLiff()"
        >
          重新初始化
        </div>
      </div>
    </div>

    <script>
      // 全局變量
      let reservationData = null
      let autoCloseTimer = null
      const DEBUG = false // 關閉調試模式
      let isScanning = false // 是否正在掃描中
      let viewportMetaElement = null // 存儲視口元素以便動態調整
      let rafId = null // requestAnimationFrame ID

      // 🚀 優化：包裝 console.log，非 DEBUG 模式下不輸出以提升性能
      const log = DEBUG ? console.log.bind(console) : () => {}
      const logError = console.error.bind(console) // 錯誤訊息保留
      const logWarn = console.warn.bind(console) // 警告訊息保留

      // 統一的等待時間設定 (毫秒)
      const AUTO_CLOSE_DELAY = 20000 // 20秒
      const AUTO_CLOSE_COUNTDOWN = 20 // 20秒倒數
      const SUCCESS_AUTO_CLOSE_DELAY = 2500 // 成功後 2.5 秒自動關閉

      function scheduleSuccessAutoClose() {
        setTimeout(() => {
          attemptDirectClose()
        }, SUCCESS_AUTO_CLOSE_DELAY)
      }

      function getTripIdFromQuery() {
        try {
          const params = new URLSearchParams(window.location.search)
          const directTripId = (params.get("tripId") || "").trim()
          if (directTripId) {
            return directTripId
          }

          // LIFF 有時會把參數包在 liff.state
          const liffState = (params.get("liff.state") || "").trim()
          if (liffState) {
            const decodedState = decodeURIComponent(liffState)
            const stateQuery = decodedState.startsWith("?")
              ? decodedState.slice(1)
              : decodedState
            const stateParams = new URLSearchParams(stateQuery)
            return (stateParams.get("tripId") || "").trim()
          }

          return ""
        } catch (error) {
          console.warn("解析 tripId 參數失敗:", error)
          return ""
        }
      }

      function isGuid(value) {
        return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(
          String(value || "").trim(),
        )
      }

      function resolveTripId(value) {
        const raw = String(value || "").trim()
        if (!raw) return ""

        // 1) 直接就是 GUID
        if (isGuid(raw)) return raw

        // 2) 嘗試當作 URL 解析（支援掃到 LIFF 連結）
        const extractFromUrl = (urlValue) => {
          try {
            const url = new URL(urlValue)
            const direct = (url.searchParams.get("tripId") || "").trim()
            if (direct) return direct

            const liffState = (url.searchParams.get("liff.state") || "").trim()
            if (liffState) {
              const decodedState = decodeURIComponent(liffState)
              const stateQuery = decodedState.startsWith("?")
                ? decodedState.slice(1)
                : decodedState
              const stateParams = new URLSearchParams(stateQuery)
              return (stateParams.get("tripId") || "").trim()
            }
          } catch (_) {}
          return ""
        }

        let extracted = extractFromUrl(raw)
        if (!extracted) {
          try {
            extracted = extractFromUrl(decodeURIComponent(raw))
          } catch (_) {}
        }

        return isGuid(extracted) ? extracted : ""
      }

      async function getCurrentUserId() {
        try {
          log("獲取當前用戶ID...")
          const profile = await liff.getProfile()
          const userId = (profile && profile.userId) || ""
          if (!userId) {
            throw new Error("無法取得 userId")
          }
          log("成功獲取當前用戶ID:", userId)
          return userId
        } catch (error) {
          logError("獲取用戶資料失敗:", error)
          throw error
        }
      }

      async function handleDirectBoardingFromQuery(tripId) {
        const normalizedTripId = resolveTripId(tripId)
        if (!normalizedTripId) {
          updateStatusIndicator("❌ QRCode 內容格式錯誤", "error")
          showStatusMessageWithClose(
            "QRCode 內容缺少有效的 tripId，請重新列印後再試",
            "error",
            true,
          )
          return false
        }

        updateStatusIndicator("🔄 正在驗證 LINE 身分...", "info")

        // 外部瀏覽器時，先走 LIFF 登入後回跳同網址
        if (typeof liff.isLoggedIn === "function" && !liff.isLoggedIn()) {
          try {
            liff.login({ redirectUri: window.location.href })
            return false
          } catch (error) {
            console.error("LIFF 登入失敗:", error)
            showStatusMessageWithClose(
              "LINE 登入失敗，請重新掃描 QRCode 再試一次",
              "error",
              true,
            )
            return false
          }
        }

        try {
          updateStatusIndicator("🔍 讀取乘客資料中...", "info")
          showLoading("正在識別乘客身份...")
          const userId = await getCurrentUserId()
          hideLoading()

          if (DEBUG)
            log("URL直送模式 - TripId:", normalizedTripId, "UserId:", userId)

          await checkReservationStatus(normalizedTripId, userId)
          return true
        } catch (error) {
          hideLoading()
          console.error("URL 直送核銷流程失敗:", error)
          updateStatusIndicator("❌ 獲取用戶資料失敗", "error")
          showStatusMessageWithClose(
            "無法獲取 LINE 使用者資料，請改用 LINE 內掃描功能",
            "error",
            true,
          )
          return false
        }
      }

      // 緊急重啟功能
      function restartLiff() {
        log("🔄 緊急重啟 LIFF...")
        // 重置標記
        liffInitialized = false
        initializationInProgress = false
        scannerStarted = false

        // 顯示重啟訊息
        updateStatusIndicator("🔄 重新初始化中...", "info")

        // 延遲一點執行以確保 UI 更新
        setTimeout(() => {
          // 重新呼叫初始化函數
          initLiff()
        }, 300)
      }

      const API_BASE_URL = (() => {
        // 檢查是否為本地開發環境
        if (
          window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1"
        ) {
          return window.location.origin + "/api/KeepSeat"
        }
        // 生產環境使用指定的後端地址
        return "https://35.221.146.143.nip.io/linehook/KeepSeat"
      })()
      //const API_BASE_URL = "http://localhost:5000/linehook/api/KeepSeat"
      // 更新狀態指示器
      function updateStatusIndicator(message, type = "info") {
        const indicator = document.getElementById("statusIndicator")
        if (!indicator) return

        indicator.textContent = message

        // 根據類型設定顏色
        switch (type) {
          case "success":
            indicator.style.background = "#27ae60"
            break
          case "error":
            indicator.style.background = "#e74c3c"
            break
          case "warning":
            indicator.style.background = "#f39c12"
            break
          case "info":
          default:
            indicator.style.background = "#3498db"
            break
        }
      }

      // 隱藏狀態指示器
      function hideStatusIndicator() {
        const indicator = document.getElementById("statusIndicator")
        if (indicator) {
          indicator.style.display = "none"
        }
      }

      // 開始倒數計時並關閉頁面
      function startAutoCloseTimer() {
        let countdown = AUTO_CLOSE_COUNTDOWN
        const timerElement = document.getElementById("autoCloseTimer")

        if (autoCloseTimer) {
          clearInterval(autoCloseTimer)
        }

        autoCloseTimer = setInterval(() => {
          countdown--
          if (timerElement) {
            timerElement.textContent = `${countdown}秒後自動關閉並返回聊天室...`
          }

          if (countdown <= 0) {
            clearInterval(autoCloseTimer)
            closePage()
          }
        }, 1000)
      }

      // 關閉頁面
      function closePage(force) {
        if (window.__closingInProgress) {
          // 若 force 且已超過 800ms，可強制重試一次
          const started = window.__closingStartedAt || 0
          if (force && Date.now() - started > 800) {
            console.log("[closePage] 強制重試關閉流程")
          } else {
            console.log("[closePage] 已在處理關閉流程，略過本次呼叫")
            return
          }
        }
        window.__closingInProgress = true
        window.__closingStartedAt = Date.now()
        log("[closePage] 嘗試關閉頁面, force=", !!force)

        // 主要：LIFF 內關閉
        try {
          if (
            typeof liff !== "undefined" &&
            liff &&
            typeof liff.isInClient === "function" &&
            liff.isInClient()
          ) {
            if (typeof liff.closeWindow === "function") {
              console.log("[closePage] 使用 liff.closeWindow()")
              liff.closeWindow()
              return
            }
          }
        } catch (e) {
          console.warn("[closePage] liff close 失敗", e)
        }

        // 次要：瀏覽器視窗 (可能被阻擋)
        let windowCloseAttempted = false
        try {
          window.close()
          windowCloseAttempted = true
        } catch (e) {
          console.warn("[closePage] window.close() 失敗", e)
        }

        // 退回上一頁 (若是從 LINE 呼叫通常會無上一頁，可略過)
        if (force || document.referrer) {
          try {
            history.back()
            setTimeout(() => {
              if (!document.hidden) {
                console.log("[closePage] history.back() 無效，導向 line.me")
                location.href = "https://line.me/"
              }
            }, 900)
          } catch (e) {
            console.warn("[closePage] history.back() 失敗", e)
          }
        } else {
          // 顯示提示讓使用者手動關閉
          console.log("[closePage] 無法自動關閉，提示使用者手動關閉頁面")
          // 清除可能存在的舊訊息
          const oldMessages = document.querySelectorAll(".status-message")
          oldMessages.forEach((msg) => msg.remove())

          showStatusMessageWithClose(
            "因瀏覽器安全限制，無法自動關閉視窗<br><br>請手動關閉此分頁或視窗",
            "warning",
            false, // 不顯示關閉按鈕，因為按鈕也無法關閉視窗
          )
          setTimeout(() => {
            window.__closingInProgress = false
          }, 1800)
        }
        // 安全保險：2 秒後若仍未關閉允許再次觸發
        setTimeout(() => {
          if (!document.hidden) {
            window.__closingInProgress = false
          }
        }, 2000)
      }

      // 嘗試在使用者點擊同步階段直接關閉 LIFF 視窗
      function attemptDirectClose() {
        try {
          if (
            typeof liff !== "undefined" &&
            liff &&
            typeof liff.isInClient === "function" &&
            liff.isInClient() &&
            typeof liff.closeWindow === "function"
          ) {
            console.log("[attemptDirectClose] 呼叫 liff.closeWindow()")
            liff.closeWindow()
            setTimeout(() => {
              if (!document.hidden) {
                console.log(
                  "[attemptDirectClose] liff.closeWindow 未生效，fallback closePage",
                )
                closePage(true)
              }
            }, 360)
            return
          }
        } catch (e) {
          console.warn("[attemptDirectClose] 直接關閉失敗", e)
        }
        closePage(true)
      }

      // 初始化LIFF
      document.addEventListener("DOMContentLoaded", function () {
        const directTripId = getTripIdFromQuery()

        // 狀態指示器點擊計數，連續點擊5次將顯示緊急重啟按鈕
        let clickCount = 0
        let clickTimer = null
        const statusIndicator = document.getElementById("statusIndicator")

        if (statusIndicator) {
          statusIndicator.addEventListener("click", function () {
            clickCount++

            if (clickCount === 1) {
              clickTimer = setTimeout(() => {
                clickCount = 0
              }, 3000) // 3秒內需完成5次點擊
            }

            if (clickCount >= 5) {
              clearTimeout(clickTimer)
              clickCount = 0
              document.getElementById("emergencyRestart").style.display =
                "block"
              console.log("已啟用緊急重啟按鈕")
            }
          })
        }

        if (!directTripId) {
          // 先切換為簡易模式，提升相機啟動性能
          prepareForScan()

          // 先只顯示最基本 UI 元素（減少初始渲染負擔）
          document
            .querySelectorAll(".container > *:not(#statusIndicator)")
            .forEach((el) => {
              if (el.id !== "statusIndicator") {
                el.style.visibility = "hidden"
              }
            })
        } else {
          updateStatusIndicator("🔄 準備進行搭乘確認...", "info")
        }

        // 儲存viewport元素，以便動態調整縮放
        viewportMetaElement = document.querySelector('meta[name="viewport"]')

        // 立即初始化 LIFF（有 tripId 時會直接執行核銷，無 tripId 才開啟掃描器）
        initLiff().catch((err) => {
          console.error("LIFF 初始化失敗:", err)
        })

        // 事件委派 - 一次性綁定事件以減少事件監聽器數量
        document.body.addEventListener("click", function (e) {
          const t = e.target
          if (!t) return
          const trigger =
            t.closest("[data-close],[data-close-inline]") ||
            (t.getAttribute &&
            (t.getAttribute("onclick") || "").includes("closePage")
              ? t
              : null)
          if (trigger) {
            e.preventDefault()
            if (trigger.__closing) return
            trigger.__closing = true
            const originalOpacity = trigger.style.opacity
            trigger.style.opacity = "0.55"
            if (
              trigger.hasAttribute("data-direct-close") ||
              trigger.hasAttribute("data-close-inline")
            ) {
              attemptDirectClose()
            } else {
              closePage(true)
            }
            setTimeout(() => {
              trigger.__closing = false
              trigger.style.opacity = originalOpacity
            }, 1200)
          }
        })

        // 綁定中央提示按鈕（避免 inline handler 失效情況）
        const inlineBtn = document.getElementById("inlineCenterAlertClose")
        if (inlineBtn && !inlineBtn.__bound) {
          inlineBtn.__bound = true
          inlineBtn.addEventListener("click", function (ev) {
            ev.preventDefault()
            if (this.disabled) return
            this.disabled = true
            this.style.opacity = ".55"
            try {
              attemptDirectClose()
            } catch (e) {
              console.warn(e)
              closePage(true)
            }
            setTimeout(() => {
              if (!document.hidden) closePage(true)
            }, 500)
          })
        }
      })

      // 掃描前的準備工作
      function prepareForScan() {
        // 簡化掃描階段樣式 (移除複雜動畫和陰影)
        document.body.classList.add("suspend-transitions", "scanning-mode")

        // 動態降低解析度以提高相機性能
        if (viewportMetaElement) {
          viewportMetaElement.setAttribute(
            "content",
            "width=device-width, initial-scale=0.9, maximum-scale=0.9",
          )
        }

        // 強制 GC (啟發式)
        clearMemory()

        // 暫停所有可能耗費資源的計時器，只保留必要功能
        if (autoCloseTimer) {
          clearInterval(autoCloseTimer)
          autoCloseTimer = null
        }

        // 取消任何進行中的動畫
        if (rafId) {
          cancelAnimationFrame(rafId)
          rafId = null
        }

        isScanning = true
      }

      // 🚀 優化：簡化記憶體清理，只釋放大型對象
      function clearMemory() {
        // 釋放大型變數
        if (reservationData) {
          reservationData = null
        }
        // 移除不必要的創建新陣列操作，減少 GC 負擔
      }

      // 掃描完成後，恢復完整 UI 體驗
      function resumeAfterScan() {
        // 延遲一點執行，讓掃描結果處理先完成
        setTimeout(() => {
          // 恢復正常解析度
          if (viewportMetaElement) {
            viewportMetaElement.setAttribute(
              "content",
              "width=device-width, initial-scale=1.0, maximum-scale=1.0",
            )
          }

          document.body.classList.remove("suspend-transitions", "scanning-mode")

          // 恢復完整 UI，使用 requestAnimationFrame 確保視覺流暢
          rafId = requestAnimationFrame(() => {
            document.querySelectorAll(".container > *").forEach((el) => {
              el.style.visibility = ""
            })

            isScanning = false
            // 恢復完整功能
            loadDeferredFunctions()
          })
        }, 300)
      }

      // LIFF 初始化標誌與進度追蹤
      var liffInitialized = false
      var initializationInProgress = false

      // LIFF 初始化
      async function initLiff() {
        // 避免重複初始化
        if (liffInitialized) {
          if (DEBUG) console.log("🔍 LIFF 已經初始化過，跳過重複初始化")

          return false
        }

        // 如果30秒內無法完成初始化，則顯示錯誤並提供重啟選項
        const initTimeout = setTimeout(() => {
          if (!liffInitialized && initializationInProgress) {
            console.error("LIFF 初始化超時")
            initializationInProgress = false
            updateStatusIndicator("❌ LINE 連接超時", "error")
            showStatusMessageWithClose(
              "LINE 連接超時，請點擊下方按鈕重試",

        try {

            console.log("當前環境:", {
              userAgent: navigator.userAgent,

            setTimeout(() => {
              if (confirm("LIFF SDK載入失敗，是否要重新整理頁面？")) {
                location.reload()
              } else {
                closePage()
              }
            }, 2000)
            return false
          }

          if (DEBUG)
            console.log(

            )

          const liffId = "2007942695-y4qpaekB"
          if (DEBUG) console.log("使用 LIFF ID:", liffId)

          updateStatusIndicator("🔄 連接到 LINE 平台...", "info")

          // 使用 try-catch 明確捕獲 init 錯誤
          try {
            console.log("開始執行 liff.init...")
            await liff.init({ liffId: liffId })
            console.log("liff.init 成功完成")
          } catch (initError) {
            console.error("🛑 LIFF 初始化錯誤:", initError)
            initializationInProgress = false
            updateStatusIndicator("❌ LINE 連接失敗", "error")
            showStatusMessageWithClose(
              "LINE 連接失敗，請稍後再試: " + (initError.message || "未知錯誤"),
              "error",
              true,
            )
            setTimeout(closePage, AUTO_CLOSE_DELAY)
            return false
          }

          if (DEBUG) console.log("✅ LIFF初始化成功")
          updateStatusIndicator("✅ 準備掃描...", "success")

          // 只記錄最簡化的環境資訊
          const liffInfo = {
            isInClient: liff.isInClient(),
            scanAvailable: liff.isApiAvailable
              ? liff.isApiAvailable("scanCodeV2")
              : false,
          }
          if (DEBUG) console.log("LIFF 環境資訊:", liffInfo)

          const directTripId = getTripIdFromQuery()

          if (directTripId) {
            // 標記初始化完成，讓共用流程可正常執行
            liffInitialized = true
            // URL 直送模式：直接抓 userId 並送後台，不啟動掃描器
            await handleDirectBoardingFromQuery(directTripId)
            return true
          }

          // 檢查是否在 LINE 客戶端中
          if (!liff.isInClient()) {
            hideStatusIndicator()
            showStatusMessageWithClose(
              "親愛的乘客您好：<br><br>搭乘確認掃描功能請使用大都會官方Line好友功能中的<strong>（搭乘確認）</strong>功能，以識別是您的搭乘，謝謝您",
              "error",
              true,
            )
            // 不自動關閉，讓用戶看完訊息後手動點擊關閉按鈕
            return false
          }

          // 檢查掃描功能是否可用
          if (!liff.isApiAvailable("scanCodeV2")) {
            updateStatusIndicator("❌ LINE版本不支援掃描", "error")
            showStatusMessageWithClose(
              "此LINE版本不支援掃描功能，請更新LINE",
              "error",
              true,
            )
            setTimeout(closePage, AUTO_CLOSE_DELAY)

          startScanner()

        } catch (error) {

          updateStatusIndicator("❌ LINE 連接失敗", "error")
          showStatusMessageWithClose(
            "LINE 功能初始化失敗: " + (error.message || "未知錯誤"),
            "error",
            true,
          )
          setTimeout(closePage, AUTO_CLOSE_DELAY)
          return false
        } finally {
          initializationInProgress = false
        }
      }

      // 主初始化函數 - 增加防護機制避免重複呼叫

      // 延遲載入非必要功能，避免阻塞掃描
      function loadDeferredFunctions() {
        if (DEBUG) console.log("載入延遲功能...")
        // 這裡可以放置掃描後才需要的功能初始化
      }

      // 追蹤掃描器狀態
      var scannerStarted = false

      // 開啟LIFF掃描器
      async function startScanner() {
        // 避免重複啟動掃描器
        if (scannerStarted) {
          if (DEBUG) console.log("⚠️ 掃描器已啟動，避免重複啟動")
          return
        }

        try {
          // 檢查 LIFF 是否初始化完成
          if (!liffInitialized) {
            console.warn("⚠️ LIFF尚未初始化完成，無法啟動掃描器")
            showStatusMessageWithClose(
              "LINE功能初始化尚未完成，請稍後再試",
              "error",
              true,
            )
            return
          }

          log("開始啟動掃描器...")
          scannerStarted = true

          // 🚀 優化：批次處理 DOM 更新，減少重排
          requestAnimationFrame(() => {
            updateStatusIndicator("📱 開啟相機中...", "info")
            showLoading(
              "開啟相機...<br><small style='font-size:12px;color:#666;margin-top:5px;'>💡 請選擇「僅在使用該應用程式時允許」</small>",
            )

            // 提前進入掃描模式以優化性能
            prepareForScan()
          })

          if (!liff.isInClient()) {
            hideLoading()
            scannerStarted = false
            hideStatusIndicator()
            // 隱藏頁面主體內容
            const container = document.querySelector(".container")
            if (container) container.style.display = "none"
            showStatusMessageWithClose(
              "親愛的乘客您好：<br><br>搭乘確認掃描功能請使用大都會官方Line好友功能中的<strong>（搭乘確認）</strong>功能，以識別是您的搭乘，謝謝您",
              "error",
              true,
            )
            // 不自動關閉，讓用戶看完訊息後手動點擊關閉按鈕
            return
          }

          // 🚀 檢查LIFF是否支援掃描功能（支援雙版本API）
          const hasScanCode =
            liff.isApiAvailable && liff.isApiAvailable("scanCode")
          const hasScanCodeV2 =
            liff.isApiAvailable && liff.isApiAvailable("scanCodeV2")

          if (!hasScanCode && !hasScanCodeV2) {
            hideLoading()
            scannerStarted = false
            logError("❌ LINE版本不支援掃描功能", {
              scanCode: hasScanCode,
              scanCodeV2: hasScanCodeV2,
              isApiAvailable: typeof liff.isApiAvailable,
            })
            updateStatusIndicator("❌ LINE版本不支援掃描", "error")
            showStatusMessageWithClose(
              "此版本LINE不支援掃描功能，請更新LINE應用程式",
              "error",
              true,
            )
            setTimeout(closePage, AUTO_CLOSE_DELAY)
            return
          }

          updateStatusIndicator("📸 請對準QR Code", "success")
          log("開始掃描QR Code...")

          // 使用 RAF 和 setTimeout 確保 UI 線程釋放
          setTimeout(() => {
            try {
              // 🚀 雙重備援：優先嘗試舊版 scanCode，失敗時使用 scanCodeV2
              let scanPromise

              if (hasScanCode) {
                log("⚡ 嘗試使用舊版 scanCode API（可能較快）...")
                scanPromise = liff.scanCode().catch((error) => {
                  logWarn("舊版 scanCode 失敗，切換到 scanCodeV2:", error)
                  if (hasScanCodeV2) {
                    log("📱 回退到新版 scanCodeV2 API")
                    return liff.scanCodeV2()
                  }
                  throw error
                })
              } else {
                log("📱 使用新版 scanCodeV2 API")
                scanPromise = liff.scanCodeV2()
              }

              scanPromise
                .then((result) => {
                  // 重置掃描器狀態
                  scannerStarted = false

                  if (result) {
                    log("掃描結果:", result.value)
                    updateStatusIndicator("✅ 掃描成功", "success")
                    hideLoading()

                    // 恢復完整 UI
                    resumeAfterScan()

                    // 處理掃描結果 (延遲一點執行以確保 UI 更新完成)
                    setTimeout(() => {
                      processScanResult(result.value)
                    }, 100)
                  }
                })
                .catch((error) => {
                  // 重置掃描器狀態
                  scannerStarted = false

                  logError("掃描失敗:", error)
                  hideLoading()

                  if (error.code === "USER_CANCEL") {
                    updateStatusIndicator("⚠️ 掃描已取消", "warning")
                    showStatusMessage("掃描已取消，即將關閉頁面", "warning")
                    setTimeout(closePage, AUTO_CLOSE_DELAY)
                    return
                  }

                  // 其他錯誤
                  updateStatusIndicator("❌ 掃描失敗", "error")
                  showStatusMessage(
                    `掃描失敗：${error.message || error.code || "未知錯誤"}`,
                    "error",
                  )
                  setTimeout(closePage, AUTO_CLOSE_DELAY)
                })
            } catch (scannerError) {
              console.error("啟動掃描器錯誤:", scannerError)
              hideLoading()
              scannerStarted = false
              updateStatusIndicator("❌ 掃描功能異常", "error")
              showStatusMessageWithClose(
                "掃描功能異常: " +
                  (scannerError.message || "未知錯誤") +
                  "<br><small>請確認您已授予相機權限，並使用最新版本的LINE應用程式</small>",
                "error",
                true,
              )
            }
          }, 0) // 🚀 優化：立即執行以減少延遲
        } catch (error) {
          if (DEBUG) console.error("掃描失敗:", error)
          hideLoading()
          // 重置掃描器狀態
          scannerStarted = false

          updateStatusIndicator("❌ 掃描失敗", "error")
          showStatusMessage(
            `掃描失敗：${error.message || error.code || "未知錯誤"}`,
            "error",
          )
          setTimeout(closePage, AUTO_CLOSE_DELAY)
        }
      }

      // 處理掃描結果
      async function processScanResult(qrValue) {
        try {
          updateStatusIndicator("🔍 查詢中...", "info")
          showLoading("查詢保留座位申請...")

          // 支援純 tripId 或 LIFF URL 兩種掃描內容
          const tripId = resolveTripId(qrValue)
          if (!tripId) {
            hideLoading()
            updateStatusIndicator("❌ QRCode 內容格式錯誤", "error")
            showStatusMessage(
              "無法解析 tripId，請確認使用最新列印的 QRCode",
              "error",
            )
            setTimeout(closePage, AUTO_CLOSE_DELAY)
            return
          }

          // 獲取當前用戶ID
          let userId
          try {
            userId = await getCurrentUserId()
          } catch (error) {
            updateStatusIndicator("❌ 獲取用戶資料失敗", "error")
            showStatusMessage("無法獲取用戶資料，請確認LIFF環境正常", "error")
            setTimeout(closePage, AUTO_CLOSE_DELAY)
            return
          }

          if (DEBUG) log("掃描結果 - TripId:", tripId, "UserId:", userId)

          // 先查詢預約狀態
          await checkReservationStatus(tripId, userId)
        } catch (error) {
          console.error("處理掃描結果失敗:", error)
          updateStatusIndicator("❌ 查詢失敗", "error")
          showStatusMessage("查詢預約資訊失敗", "error")
          setTimeout(closePage, AUTO_CLOSE_DELAY)
        } finally {
          hideLoading()
        }
      }

      // 檢查預約狀態
      async function checkReservationStatus(tripId, userId) {
        try {
          updateStatusIndicator("🔍 正在查詢保留座位...", "info")
          showLoading("查詢保留座位...")

          // 先檢查趟次狀態，若非 completed 則不允許核銷，顯示前端訊息
          try {
            const tripResp = await fetch(`${API_BASE_URL}/Trip/${tripId}`)
            if (tripResp.ok) {
              const tripJson = await tripResp.json()
              const tripStatus = (tripJson?.data?.status || "").toLowerCase()
              if (tripStatus !== "completed") {
                hideLoading()
                showTripNotDepartedMessage()
                return
              }
            }
          } catch (e) {
            console.warn("檢查趟次狀態失敗，將採用後端檢核：", e)
          }

          // 查詢預約資訊（包含已搭乘和未搭乘的）
          const response = await fetch(
            `${API_BASE_URL}/reservation-status?tripId=${tripId}&userId=${userId}`,
            {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
              },
            },
          )

          if (response.ok) {
            const reservation = await response.json()
            hideLoading()

            // 一、今天有預約並已搭乘，且排定的和掃描搭乘的是同趟次
            if (
              reservation.hasReservation &&
              reservation.isForThisTrip &&
              reservation.isBoarded
            ) {
              showAlreadyBoardedMessage({
                ...reservation,
                // 前端客製標題
                customTitle: "🚌 歡迎您搭乘本趟次：",
              })
              return
            }

            // 二、今天有預約但未搭乘，且是同趟次 => 允許核銷
            if (
              reservation.hasReservation &&
              reservation.isForThisTrip &&
              !reservation.isBoarded
            ) {
              await performBoarding(tripId, userId)
              return
            }

            // 三、今天有預約但已搭乘(視為沒預約)，無論是不是同趟次
            // 四、今天沒預約
            updateStatusIndicator("ℹ️ 未查到保留座位申請", "warning")
            const details = document.getElementById("reservationDetails")
            details.innerHTML = `
              <div style="grid-column: 1 / -1; text-align: left; padding: 24px 16px;">
                <div style="font-size: 20px; font-weight: 700; color: #c0392b; margin-bottom: 10px; line-height: 1.6;">
                  本趟次未查到您的申請記錄，若您搭乘的非通知保留的班車，請記得在今日內取消保留，以免影響您的權益
                </div>
        <button 
          data-close="1" data-direct-close="1" onclick="attemptDirectClose()" 
                  style="background: #7f8c8d; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 14px; margin-top: 8px; cursor: pointer;"
                >
                  立即關閉
                </button>
              </div>
            `
            const titleElement = document.querySelector("#reservationInfo h3")
            if (titleElement) titleElement.textContent = "ℹ️ 未查到保留座位申請"
            document.getElementById("reservationInfo").style.display = "block"
            showScanResult("ℹ️ 未查到保留座位申請", "error")
            startAutoCloseTimer()
          } else {
            // 如果查詢 API 不存在，直接嘗試核銷（保持向後相容）
            hideLoading()
            await performBoarding(tripId, userId)
          }
        } catch (error) {
          console.error("查詢保留座位狀態失敗:", error)
          hideLoading()

          // 如果查詢失敗，直接嘗試核銷（保持向後相容）
          await performBoarding(tripId, userId)
        }
      }

      // 執行核銷
      async function performBoarding(tripId, userId) {
        try {
          updateStatusIndicator("🎯 正在執行搭乘確認...", "info")
          showLoading("執行搭乘確認中...")

          const response = await fetch(`${API_BASE_URL}/board-trip`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              tripId: tripId,
              userId: userId,
            }),
          })

          if (response.ok) {
            const result = await response.json()
            hideLoading()

            // 核銷成功
            updateStatusIndicator("✅ 您已搭乘本趟次", "success")
            showBoardingSuccess(result)
          } else {
            const errorData = await response.json()
            hideLoading()
            const rawMsg =
              (errorData &&
                (errorData.message ||
                  errorData.msg ||
                  errorData.error ||
                  errorData.title)) ||
              ""
            const textMsg =
              typeof rawMsg === "string" ? rawMsg : JSON.stringify(rawMsg)

            // 特殊處理：本趟次尚未發車 => 使用中央提示樣式，不彈出舊 modal
            if (textMsg.includes("尚未發車") || textMsg.includes("未發車")) {
              updateStatusIndicator("⚠️ 本趟次尚未發車", "warning")
              showTripNotDepartedMessage()
              return
            }

            updateStatusIndicator("❌ 搭乘確認失敗", "error")
            showStatusMessage(textMsg || "搭乘確認失敗", "error")
            setTimeout(closePage, AUTO_CLOSE_DELAY)
          }
        } catch (error) {
          hideLoading()
          console.error("搭乘確認請求失敗:", error)
          updateStatusIndicator("❌ 網路錯誤", "error")
          showStatusMessage("網路錯誤，搭乘確認失敗", "error")
          setTimeout(closePage, AUTO_CLOSE_DELAY)
        }
      }

      // 已核銷情況的5秒倒數計時
      function startAlreadyBoardedTimer() {
        let countdown = 15
        const timerElement = document.getElementById("autoCloseTimer")

        if (autoCloseTimer) {
          clearInterval(autoCloseTimer)
        }

        if (timerElement) {
          timerElement.textContent = `${countdown}秒後自動關閉並返回聊天室...`
        }

        autoCloseTimer = setInterval(() => {
          countdown--
          if (timerElement) {
            timerElement.textContent = `${countdown}秒後自動關閉並返回聊天室...`
          }

          if (countdown <= 0) {
            clearInterval(autoCloseTimer)
            closePage()
          }
        }, 1000)
      }

      // 顯示掃描結果
      function showScanResult(message, type) {
        if (isScanning) return // 掃描中不顯示結果，避免干擾

        const resultDiv = document.getElementById("scanResult")
        const contentDiv = document.getElementById("scanResultContent")

        resultDiv.className = `scan-result ${type}`
        contentDiv.textContent =
          type === "error" ? toBilingualErrorMessage(message) : message
        resultDiv.style.display = "block"
      }

      function toBilingualErrorMessage(message) {
        const raw = String(message || "").trim()
        if (!raw) {
          return "系統發生錯誤，請稍後再試 / An error occurred. Please try again later."
        }

        // 已經是中英雙語就直接使用
        if (raw.includes(" / ")) {
          return raw
        }

        const known = [
          {
            test: /(One or more validation errors occurred|validation errors?)/i,
            zh: "欄位驗證失敗，請檢查輸入資料",
            en: "Validation failed. Please check your input.",
          },
          {
            test: /網路錯誤|network/i,
            zh: "網路連線異常，請稍後再試",
            en: "Network error. Please try again later.",
          },
          {
            test: /尚未發車|未發車/i,
            zh: "本趟次尚未發車，暫時無法核銷",
            en: "This trip has not departed yet. Boarding cannot be confirmed now.",
          },
          {
            test: /無法解析.*tripId|tripId/i,
            zh: "QRCode 內容無效，請使用最新列印的 QRCode",
            en: "Invalid QRCode content. Please use the latest printed QRCode.",
          },
        ]

        const matched = known.find((item) => item.test.test(raw))
        if (matched) {
          return `${matched.zh} / ${matched.en}`
        }

        // 若原文偏中文，補通用英文；若偏英文，補通用中文
        const hasChinese = /[\u4e00-\u9fff]/.test(raw)
        if (hasChinese) {
          return `${raw} / An error occurred. Please try again.`
        }

        return `系統發生錯誤，請稍後再試 / ${raw}`
      }

      // 顯示狀態消息（帶關閉按鈕的版本）
      function showStatusMessageWithClose(
        message,
        type,
        showCloseButton = false,
      ) {
        const displayMessage =
          type === "error" ? toBilingualErrorMessage(message) : message

        // 避免重複顯示訊息
        // 1. 掃描中避免創建太多 DOM 元素（但 error 類型訊息必須顯示）
        if (isScanning && type !== "error" && !displayMessage.includes("錯誤"))
          return

        // 2. 檢查是否已經有相同訊息正在顯示
        const existingMessage = document.querySelector(".status-message")
        if (existingMessage) {
          // 使用正則表達式移除所有HTML標籤進行比較
          const stripHtml = (html) => html.replace(/<[^>]*>?/gm, "")
          const existingText = stripHtml(existingMessage.innerHTML)
          const newText = stripHtml(displayMessage)

          // 如果已有相同訊息，則不重複顯示
          if (
            existingText.includes(newText) ||
            newText.includes(existingText)
          ) {
            return
          }
          existingMessage.remove()
        }

        // 創建新的狀態消息 (使用簡化的 HTML，減少渲染負擔)
        const messageElement = document.createElement("div")
        messageElement.className = `status-message ${type}`
        messageElement.dataset.created = Date.now() // 添加時間戳記

        if (showCloseButton) {
          // 簡化按鈕樣式，使用基本樣式
          messageElement.innerHTML = `
            <div style="margin-bottom: 15px; line-height: 1.6;">${displayMessage}</div>
            <button 
              data-close="1" data-direct-close="1" onclick="attemptDirectClose()" 
              style="background: white; color: #333; border: none; padding: 12px 32px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); min-width: 120px;"
              onmouseover="this.style.background='#f0f0f0'" 
              onmouseout="this.style.background='white'"
            >
              關閉
            </button>
          `
        } else {
          messageElement.textContent = displayMessage
        }

        document.body.appendChild(messageElement)

        // 設置唯一ID用於追蹤定時器
        const messageId = `msg_${Date.now()}_${Math.random()
          .toString(36)
          .substr(2, 5)}`
        messageElement.id = messageId

        // 清除可能存在的之前的定時器
        if (window.messageTimers && window.messageTimers[messageId]) {
          clearTimeout(window.messageTimers[messageId])
        }

        // 初始化定時器追蹤對象
        if (!window.messageTimers) window.messageTimers = {}

        // 自動移除消息（如果有關閉按鈕則延長時間）
        const timeout = showCloseButton ? AUTO_CLOSE_DELAY : 3000
        window.messageTimers[messageId] = setTimeout(() => {
          if (messageElement && messageElement.parentNode) {
            messageElement.remove()
          }
          // 清除定時器引用
          delete window.messageTimers[messageId]
        }, timeout)

        // 調試輸出 (在控制台顯示訊息建立時間)
        console.log(
          `訊息已建立: ${displayMessage.substring(
            0,
            20,
          )}... (${type}), ID: ${messageId}, 將在 ${timeout / 1000}秒後關閉`,
        )
      }
      function showStatusMessage(message, type) {
        // 呼叫帶有關閉按鈕的版本，預設顯示立即關閉按鈕
        showStatusMessageWithClose(message, type, true)
      }

      // 顯示載入中
      function showLoading(text = "確認中...") {
        const overlay = document.getElementById("loadingOverlay")
        document.querySelector(".loading-text").textContent = text

        // 使用 RAF 更流暢地顯示
        cancelAnimationFrame(rafId)
        rafId = requestAnimationFrame(() => {
          overlay.classList.add("visible")
        })
      }

      // 隱藏載入中
      function hideLoading() {
        const overlay = document.getElementById("loadingOverlay")
        // 使用 RAF 確保流暢過渡
        cancelAnimationFrame(rafId)
        rafId = requestAnimationFrame(() => {
          overlay.classList.remove("visible")
        })
      }
    </script>
